[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "pdelie"
version = "0.1.0"
description = "Stable V0.1 vertical slice for PDE Lie symmetry discovery"
requires-python = ">=3.11"
dependencies = [
  "numpy>=1.24",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

